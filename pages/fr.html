<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FR Budget Status</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef2f6;
      --text: #1f2933;
      --muted: #607080;
      --line: #d8e0e8;
      --accent: #126a66;
      --accent-soft: #dcefeb;
      --warn: #a85f00;
      --good: #126a3a;
      --bad: #a13131;
      font-family: Arial, Helvetica, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      padding: 18px 24px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }
    .tab {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    main { padding: 18px 24px 28px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
    }
    .stat .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .stat .value {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 700;
    }
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      max-height: calc(100vh - 230px);
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1220px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: middle;
    }
    th {
      background: #e8edf2;
      position: sticky;
      top: 0;
      z-index: 2;
      font-size: 12px;
      text-align: center;
    }
    th.group {
      background: #d9e7e4;
      color: #123f3c;
    }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.name { min-width: 210px; }
    td.head { text-align: center; font-weight: 700; }
    tr.total-row td {
      font-weight: 700;
      background: #f0f5f4;
    }
    .positive { color: var(--good); }
    .negative { color: var(--bad); }
    .muted { color: var(--muted); }
    .bar-cell { min-width: 120px; }
    .bar {
      width: 100%;
      height: 8px;
      background: #edf1f5;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 4px;
    }
    .bar > span {
      display: block;
      height: 100%;
      background: var(--accent);
      width: 0;
    }
    .analysis-table { min-width: 850px; }
    .analysis-table th:first-child, .analysis-table td:first-child {
      text-align: left;
      min-width: 160px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 12px;
    }
    .export-btn {
      border: 1px solid #0f5f98;
      background: #1478c8;
      color: #ffffff;
      border-radius: 6px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }
    .report-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      padding: 12px;
    }
    .report-title {
      text-align: center;
      font-size: 34px;
      font-weight: 500;
      margin: 2px 0 4px;
      color: #000000;
    }
    .report-figure {
      text-align: right;
      margin: 0 4px 4px 0;
      color: #000000;
      font-size: 14px;
    }
    table.report-table {
      min-width: 760px;
      border-collapse: collapse;
      color: #000000;
    }
    .report-table th {
      position: static;
      background: #1478c8;
      color: #ffffff;
      font-size: 16px;
      padding: 5px 6px;
      border: 1px solid #ffffff;
    }
    .report-table tr.index-row th {
      background: #c5cfe2;
      color: #000000;
      font-size: 13px;
    }
    .report-table td {
      border: 1px solid #ffffff;
      padding: 4px 6px;
      background: #dbe2ee;
      font-size: 14px;
    }
    .report-table tbody tr:nth-child(even) td {
      background: #c8d2e4;
    }
    .report-table tbody tr.total-row td {
      background: #c1cce0;
      font-weight: 700;
    }
    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 860px) {
      header, main { padding-left: 14px; padding-right: 14px; }
      .tabs { padding-left: 14px; padding-right: 14px; }
      .summary-grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
  
    .table-container, .panel, .report-wrap { overflow:auto; }
    table { table-layout:auto !important; width:max-content !important; min-width:100% !important; border-collapse:separate !important; border-spacing:0 !important; }
    th, td { white-space:nowrap !important; }
    th { position:sticky; top:0; z-index:4; }
    .report-figure, .subtitle, .note { text-align:right !important; }
    .report-table tr.index-row th { top:31px; }
        </style>
</head>

    const funds = ["CAP", "DRF", "DF", "CAPITAL FUND", "S FUND", "EBR-(S)", "RRSK"];

    const fmt = new Intl.NumberFormat("en-IN", { maximumFractionDigits: 2 });
    const pct = value => `${Number.isFinite(value) ? value.toFixed(2) : "0.00"}%`;
    const money = value => fmt.format(Math.round((value + Number.EPSILON) * 100) / 100);
    const cls = value => value < 0 ? "negative" : value > 0 ? "positive" : "muted";

    function totalFor(sheet) {
      return sheet.total?.funds?.TOTAL || { sba: 0, ae: 0, available: 0, spentPct: 0, remainPct: 0 };
    }

    function summaryCards(sheet) {
      const total = totalFor(sheet);
      return `
        <div class="summary-grid">
          <div class="stat"><div class="label">Total SBA</div><div class="value">${money(total.sba)}</div></div>
          <div class="stat"><div class="label">Total AE</div><div class="value">${money(total.ae)}</div></div>
          <div class="stat"><div class="label">Available Balance</div><div class="value ${cls(total.available)}">${money(total.available)}</div></div>
          <div class="stat"><div class="label">Expenditure</div><div class="value">${pct(total.spentPct)}</div></div>
        </div>`;
    }

    function sheetTable(sheet) {
      const groupHeads = funds.map(f => `<th class="group" colspan="4">${f}</th>`).join("");
      const metricHeads = funds.map(() => `<th>SBA</th><th>AE</th><th>Available</th><th>Exp %</th>`).join("");
      const rows = sheet.records.map(rec => planRow(rec)).join("") + planRow(sheet.total, true);
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th rowspan="2">Plan Head</th><th rowspan="2">Plan Head Name</th>${groupHeads}<th class="group" colspan="4">Overall Total</th></tr>
              <tr>${metricHeads}<th>SBA</th><th>AE</th><th>Available</th><th>Exp %</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <p class="note">Workbook VAR values are converted here to positive available balance using SBA minus AE.</p>`;
    }

    function planRow(rec, isTotal = false) {
      if (!rec) return "";
      const cells = funds.map(f => fundCells(rec.funds[f])).join("");
      const total = rec.funds.TOTAL;
      return `
        <tr class="${isTotal ? "total-row" : ""}">
          <td class="head">${htmlEscape(rec.planHead || "")}</td>
          <td class="name">${htmlEscape(rec.planName || "")}</td>
          ${cells}
          ${fundCells(total)}
        </tr>`;
    }

    function fundCells(values) {
      return `
        <td class="num">${money(values.sba)}</td>
        <td class="num">${money(values.ae)}</td>
        <td class="num ${cls(values.available)}">${money(values.available)}</td>
        <td class="num">${pct(values.spentPct)}</td>`;
    }

    function analysisTable(sheet) {
      const rows = funds.map(fund => {
        const values = sheet.fundAnalysis[fund];
        const width = Math.max(0, Math.min(100, values.spentPct));
        return `
          <tr>
            <td><strong>${fund}</strong></td>
            <td class="num">${money(values.sba)}</td>
            <td class="num">${money(values.ae)}</td>
            <td class="num ${cls(values.available)}">${money(values.available)}</td>
            <td class="num">${pct(values.spentPct)}</td>
            <td class="num">${pct(values.remainPct)}</td>
            <td class="bar-cell"><span>${pct(values.spentPct)}</span><div class="bar"><span style="width:${width}%"></span></div></td>
          </tr>`;
      }).join("");
      return `
        ${summaryCards(sheet)}
        <div class="table-wrap">
          <table class="analysis-table">
            <thead>
              <tr>
                <th>Fund</th><th>SBA</th><th>AE</th><th>Available</th><th>Expensed %</th><th>Remaining %</th><th>Progress</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function reportTable(sheet, reportId) {
      const rows = sheet.records.map(rec => reportRow(rec)).join("") + reportRow(sheet.total, true);
      return `
        <div class="toolbar">
          <p class="subtitle">${htmlEscape(sheet.title)}</p>
        </div>
        <div class="report-wrap">
          <div class="report-title">Plan Head Expenditure</div>
          <div class="report-figure">Remarks - Figures in '000' (thousands)</div>
          <table class="report-table" id="${reportId}">
            <thead>
              <tr><th>Plan Head</th><th>SBA 2026-27</th><th>AE</th><th>Variation (3 - 2)</th><th>%age SBA</th></tr>
              <tr class="index-row"><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function reportRow(rec, isTotal = false) {
      if (!rec) return "";
      const total = rec.funds.TOTAL;
      const planLabel = rec.planHead || rec.planName || "";
      const variation = total.ae - total.sba;
      return `
        <tr class="${isTotal ? "total-row" : ""}">
          <td>${htmlEscape(planLabel)}</td>
          <td class="num">${money(total.sba)}</td>
          <td class="num">${money(total.ae)}</td>
          <td class="num">${money(variation)}</td>
          <td class="num">${total.sba ? total.spentPct.toFixed(2) : "#DIV/0!"}</td>
        </tr>`;
    }

    function reportTableForExport(sheet) {
      const rows = sheet.records.map(rec => reportRow(rec)).join("") + reportRow(sheet.total, true);
      return `
        <h2>${htmlEscape(sheet.sheetName)} - Plan Head Expenditure</h2>
        <table border="1">
          <thead>
            <tr><th>Plan Head</th><th>SBA 2026-27</th><th>AE</th><th>Variation (3 - 2)</th><th>%age SBA</th></tr>
            <tr><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function fundAnalysisForExport(sheet) {
      const rows = funds.map(fund => {
        const values = sheet.fundAnalysis[fund];
        return `
          <tr>
            <td>${fund}</td>
            <td>${money(values.sba)}</td>
            <td>${money(values.ae)}</td>
            <td>${money(values.available)}</td>
            <td>${pct(values.spentPct)}</td>
            <td>${pct(values.remainPct)}</td>
          </tr>`;
      }).join("");
      return `
        <h2>${htmlEscape(sheet.sheetName)} - Fund Analysis</h2>
        <table border="1">
          <thead>
            <tr><th>Fund</th><th>SBA</th><th>AE</th><th>Available</th><th>Expensed %</th><th>Remaining %</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function exportAllToExcel() {
      const safeName = "FR Budget Status";
      const htmlDoc = `
        <html>
          <head>
            <meta charset="utf-8">
            <style>
              body { font-family: Arial, sans-serif; }
              h1 { font-size: 20px; }
              h2 { font-size: 16px; margin-top: 24px; }
              table { border-collapse: collapse; margin-bottom: 18px; }
              th { background: #1478c8; color: #ffffff; font-weight: bold; }
              td, th { border: 1px solid #999999; padding: 5px 8px; }
              td.num { text-align: right; }
              tr.total-row td { font-weight: bold; background: #dbe2ee; }
            </style>
          </head>
          <body>
            <h1>FR Budget Status</h1>
            <p>Remarks - Figures in '000' (thousands)</p>
            ${workbookData.map(sheet => reportTableForExport(sheet)).join("<br>")}
            ${workbookData.map(sheet => fundAnalysisForExport(sheet)).join("<br>")}
          </body>
        </html>`;
      const blob = new Blob([htmlDoc], { type: "application/vnd.ms-excel;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${safeName}.xls`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
    }

    function htmlEscape(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    const tabs = [
      { id: "open-sheet", label: "OPEN LINE FR", content: () => summaryCards(workbookData[0]) + sheetTable(workbookData[0]) },
      { id: "gsu-sheet", label: "GSU FR", content: () => summaryCards(workbookData[1]) + sheetTable(workbookData[1]) },
      { id: "open-report", label: "OPEN LINE Report", content: () => reportTable(workbookData[0], "open-line-report-table") },
      { id: "gsu-report", label: "GSU Report", content: () => reportTable(workbookData[1], "gsu-report-table") },
      { id: "open-analysis", label: "OPEN LINE Analysis", content: () => analysisTable(workbookData[0]) },
      { id: "gsu-analysis", label: "GSU Analysis", content: () => analysisTable(workbookData[1]) },
    ];

    const tabsEl = document.getElementById("tabs");
    const appEl = document.getElementById("app");

    tabsEl.innerHTML = tabs.map((tab, i) => `<button class="tab${i === 0 ? " active" : ""}" data-tab="${tab.id}">${tab.label}</button>`).join("");
    appEl.innerHTML = tabs.map((tab, i) => `<section class="panel${i === 0 ? " active" : ""}" id="${tab.id}"><h2>${tab.label}</h2>${tab.content()}</section>`).join("");

    tabsEl.addEventListener("click", event => {
      const button = event.target.closest(".tab");
      if (!button) return;
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab === button));
      document.querySelectorAll(".panel").forEach(panel => panel.classList.toggle("active", panel.id === button.dataset.tab));
    });

  </script>
</body>
</html>
