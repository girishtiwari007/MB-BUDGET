<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FR Budget Status</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef2f6;
      --text: #1f2933;
      --muted: #607080;
      --line: #d8e0e8;
      --accent: #126a66;
      --accent-soft: #dcefeb;
      --warn: #a85f00;
      --good: #126a3a;
      --bad: #a13131;
      font-family: Arial, Helvetica, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      padding: 18px 24px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.4;
    }
    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }
    .tab {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    main { padding: 18px 24px 28px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
    }
    .stat .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .stat .value {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 700;
    }
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      max-height: calc(100vh - 230px);
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1220px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: middle;
    }
    th {
      background: #e8edf2;
      position: sticky;
      top: 0;
      z-index: 2;
      font-size: 12px;
      text-align: center;
    }
    th.group {
      background: #d9e7e4;
      color: #123f3c;
    }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.name { min-width: 210px; }
    td.head { text-align: center; font-weight: 700; }
    tr.total-row td {
      font-weight: 700;
      background: #f0f5f4;
    }
    .positive { color: var(--good); }
    .negative { color: var(--bad); }
    .muted { color: var(--muted); }
    .bar-cell { min-width: 120px; }
    .bar {
      width: 100%;
      height: 8px;
      background: #edf1f5;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 4px;
    }
    .bar > span {
      display: block;
      height: 100%;
      background: var(--accent);
      width: 0;
    }
    .analysis-table { min-width: 850px; }
    .analysis-table th:first-child, .analysis-table td:first-child {
      text-align: left;
      min-width: 160px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 12px;
    }
    .filterbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 260px) auto;
      gap: 10px;
      align-items: end;
      margin: 0 0 12px;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .filterbar label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .filterbar select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: #ffffff;
      color: var(--text);
      min-height: 34px;
      padding: 6px 8px;
      font: 700 13px Arial, Helvetica, sans-serif;
    }
    .reset-btn {
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--surface-2);
      color: var(--text);
      min-height: 34px;
      padding: 6px 12px;
      font: 700 13px Arial, Helvetica, sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }
    .export-btn {
      border: 1px solid #0f5f98;
      background: #1478c8;
      color: #ffffff;
      border-radius: 6px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }
    .upload-btn { background: var(--accent); border-color: var(--accent); }
    .upload-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      max-width: 980px;
    }
    .upload-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 12px;
      margin: 12px 0;
    }
    .upload-box {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
      padding: 12px;
    }
    .upload-box h3 { margin: 0 0 8px; color: #1f4e79; font-size: 14px; }
    .upload-toggle {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 1fr));
      gap: 0;
      margin: 14px 0 10px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    .upload-toggle button {
      border: 0;
      border-right: 1px solid var(--accent);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 0;
      padding: 10px 12px;
      font-weight: 800;
      cursor: pointer;
      min-height: 42px;
    }
    .upload-toggle button:last-child {
      border-right: 0;
    }
    .upload-toggle button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .copy-view-title {
      margin: 8px 0 6px;
      color: #1f4e79;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .fr-copy-card {
      border: 1px solid var(--line);
      background: #fff;
      border-left: 4px solid var(--accent);
      border-radius: 6px;
      padding: 9px 10px;
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.45;
    }
    .fr-copy-card.previous { border-left-color: #d7a72b; }
    .fr-copy-card strong { display: block; color: #1f4e79; font-size: 13px; margin-bottom: 4px; }
    .fr-copy-card span { display: block; color: var(--muted); }
    .upload-path, .backup-list {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }
    .file-picker {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
    }
    .file-picker input {
      border: 1px dashed #9db3c8;
      border-radius: 6px;
      background: #f8fbfd;
      padding: 10px;
      color: var(--text);
    }
    .upload-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .upload-status {
      margin: 12px 0 0;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fbfd;
      color: var(--muted);
      font-weight: 700;
    }
    .upload-status.good { color: var(--good); border-color: #acd7bd; background: #f2faf5; }
    .upload-status.bad { color: var(--bad); border-color: #e1b4b4; background: #fff5f5; }
    .report-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      padding: 10px;
    }
    .report-title {
      margin: 0 0 5px;
      color: #1f4e79;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .report-figure {
      text-align: right;
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    table.report-table {
      width: max-content;
      min-width: 0;
      border-collapse: separate;
      border-spacing: 0;
      color: var(--text);
      font-size: 12px;
      table-layout: auto;
    }
    .report-table th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #1f4e79;
      color: #ffffff;
      font-size: 12px;
      line-height: 1.15;
      padding: 5px 7px;
      border: 1px solid #ffffff;
      text-align: center;
      white-space: normal;
    }
    .report-table tr.index-row th {
      top: 29px;
      background: #163b5c;
      color: #ffffff;
      font-size: 11px;
      padding: 3px 7px;
    }
    .report-table td {
      border: 1px solid #ffffff;
      padding: 5px 7px;
      background: #f8fbfd;
      font-size: 12px;
      white-space: nowrap;
    }
    .report-table td:first-child,
    .report-table th:first-child {
      width: 130px;
      min-width: 120px;
      text-align: left;
    }
    .report-table td.num {
      min-width: 120px;
    }
    .report-table .col-plan { width: 130px; }
    .report-table .col-money { width: 150px; }
    .report-table .col-var { width: 160px; }
    .report-table .col-pct { width: 110px; }
    .report-table tbody tr:nth-child(even) td {
      background: #e8f2f8;
    }
    .report-table tbody tr.total-row td {
      background: #c8d6e8;
      font-weight: 700;
    }
    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 860px) {
      header, main { padding-left: 14px; padding-right: 14px; }
      .header-row { flex-direction: column; }
      .header-actions { width: 100%; justify-content: flex-start; }
      .upload-grid { grid-template-columns: 1fr; }
      .tabs { padding-left: 14px; padding-right: 14px; }
      .summary-grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
  
    .table-container, .panel, .report-wrap { overflow:auto; }
    .table-wrap table { table-layout:auto !important; width:max-content !important; min-width:0 !important; border-collapse:separate !important; border-spacing:0 !important; font-size:12px; }
    .table-wrap th, .table-wrap td { white-space:nowrap; padding:5px 7px; }
    .table-wrap th { position:sticky; top:0; z-index:4; }
    .table-wrap tbody td:first-child, .table-wrap thead th:first-child { position:sticky; left:0; z-index:5; }
    .table-wrap tbody td:first-child { background:#ffffff; box-shadow:2px 0 0 rgba(18,106,102,.10); }
    .table-wrap tbody tr:nth-child(even) td:first-child { background:#f7f9fb; }
    .table-wrap tbody tr.total-row td:first-child { background:#f0f5f4; }
    .table-wrap td.name { min-width:180px; max-width:260px; white-space:normal; line-height:1.2; }
    .table-wrap td.num { min-width:78px; }
    .table-wrap th { white-space:normal; line-height:1.15; }
    .report-figure, .subtitle, .note { text-align:right !important; }
    @media (max-width: 760px) {
      .filterbar { grid-template-columns: 1fr; }
      .reset-btn { width:100%; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      th, td { padding:5px 6px; }
      .table-wrap::before, .report-wrap::before {
        content:"Swipe left/right for full FR table";
        position:sticky;
        left:0;
        top:0;
        z-index:8;
        display:block;
        width:max-content;
        margin:0 0 6px;
        padding:5px 8px;
        border:1px solid #d9c173;
        border-radius:5px;
        background:#fff9e5;
        color:#654c00;
        font-size:11px;
        font-weight:700;
      }
    }

    /* Mobile app FR pass - 2026-07-14 */
    @media (max-width: 760px) {
      body { background:#e9eff5; }
      header { position:sticky; top:0; z-index:15; padding:10px 12px; box-shadow:0 3px 12px rgba(23,33,43,.08); }
      h1 { font-size:20px; text-align:left; }
      .subtitle { font-size:12px; line-height:1.35; text-align:left !important; }
      .header-row { gap:10px; }
      .header-actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; width:100%; }
      .export-btn { min-height:42px; border-radius:10px; display:grid; place-items:center; text-align:center; padding:8px; font-size:12px; }
      .tabs { position:sticky; top:102px; z-index:14; padding:8px; gap:7px; background:#eef3f7; border-bottom:1px solid #d6e0ea; }
      .tab { min-height:42px; border-radius:10px; padding:8px 11px; box-shadow:0 1px 4px rgba(23,33,43,.06); }
      main { padding:8px; }
      .panel h2 { margin:0 0 8px; font-size:18px; text-align:left; color:#1f4e79; }
      .filterbar, .summary-grid, .toolbar { margin-bottom:10px; }
      .filterbar { border-radius:12px; padding:10px; background:#fff; }
      .filterbar select, .reset-btn { min-height:42px; border-radius:10px; font-size:13px; }
      .summary-grid { grid-template-columns:1fr 1fr; gap:8px; }
      .stat, .table-wrap, .report-wrap, .upload-card, .upload-box { border-radius:12px; box-shadow:0 2px 10px rgba(23,33,43,.06); }
      .stat { padding:10px; }
      .stat .value { font-size:17px; }
      .table-wrap, .report-wrap { max-height:none; background:#fff; }
      .report-title { font-size:15px; }
      .upload-toggle { grid-template-columns:1fr; border-radius:12px; }
      .upload-toggle button { border-right:0; border-bottom:1px solid var(--accent); }
      .upload-toggle button:last-child { border-bottom:0; }
      .upload-grid { grid-template-columns:1fr; }
      .upload-actions { display:grid; grid-template-columns:1fr; }
      .file-picker input { min-height:42px; border-radius:10px; }
    }
    @media (max-width: 430px) {
      .header-actions, .summary-grid { grid-template-columns:1fr; }
      .tabs { top:126px; }
    }
        </style>
</head>

    function htmlEscape(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }



    async function requestFrUploadPassword() {
      if (FR_UPLOAD_STATE.unlocked) return true;
      const entered = window.prompt("Enter password to open FR Upload");
      if (entered === null) return false;
      try {
        const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(entered));
        const hash = Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, "0")).join("");
        if (hash !== FR_UPLOAD_PASSWORD_HASH) throw new Error("Incorrect password.");
        FR_UPLOAD_STATE.unlocked = true;
        FR_UPLOAD_STATE.password = entered;
        sessionStorage.setItem(FR_UPLOAD_SESSION_KEY, "1");
        return true;
      } catch (error) {
        window.alert(error.message || "Incorrect password.");
        return false;
      }
    }
    function formatFileSize(bytes) {
      if (!bytes) return "0 KB";
      if (bytes < 1024 * 1024) return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function queueFrManifestLoad() {
      if (FR_UPLOAD_STATE.manifest || FR_UPLOAD_STATE.loading) return;
      FR_UPLOAD_STATE.loading = true;
      loadFrUploadManifest().finally(() => {
        FR_UPLOAD_STATE.loading = false;
        if (activeTabId === "fr-upload") renderPanels();
      });
    }

    async function loadFrUploadManifest() {
      const browserManifest = localStorage.getItem(FR_UPLOAD_BROWSER_MANIFEST_KEY);
      try {
        const response = await fetch(`${FR_MANIFEST_URL}?ts=${Date.now()}`);
        const repoManifest = response.ok ? await response.json() : { backups: [] };
        FR_UPLOAD_STATE.manifest = browserManifest ? { ...repoManifest, ...JSON.parse(browserManifest), browserStored: true } : repoManifest;
      } catch (error) {
        FR_UPLOAD_STATE.manifest = browserManifest ? { ...JSON.parse(browserManifest), browserStored: true } : { backups: [], error: error.message };
      }
      return FR_UPLOAD_STATE.manifest;
    }

    function isLocalApiHost() {
      return ["localhost", "127.0.0.1"].includes(window.location.hostname);
    }

    async function validateFrExcelFile(file) {
      if (!file) throw new Error("Please select the latest FR Excel file first.");
      if (!/\.xlsx?$/i.test(file.name)) throw new Error("FR upload accepts only .xls or .xlsx files.");
      const head = new Uint8Array(await file.slice(0, 8).arrayBuffer());
      const isXlsx = head[0] === 0x50 && head[1] === 0x4b;
      const isXls = head[0] === 0xd0 && head[1] === 0xcf && head[2] === 0x11 && head[3] === 0xe0;
      if (!isXlsx && !isXls) throw new Error("Selected file does not look like a valid Excel .xls/.xlsx file.");
      return true;
    }

    function frRoleLabel(role) {
      return role === "previous" ? "Previous FR" : "Current FR";
    }

    function saveFrUploadInBrowser(file, role = "current") {
      const previous = FR_UPLOAD_STATE.manifest || {};
      const asOnDate = selectedFrAsOnDateIso(role);
      const roleManifest = previous[role] || {};
      const previousActive = roleManifest.activeFile || (role === "current" ? previous.activeFile : "");
      const backup = previousActive ? {
        name: `${frRoleLabel(role)} backup - ${new Date().toISOString().slice(0, 10)}`,
        activeFile: previousActive,
        originalName: roleManifest.originalName || (role === "current" ? previous.originalName : "") || previousActive,
        uploadedAt: roleManifest.uploadedAt || (role === "current" ? previous.uploadedAt : "") || asOnDate
      } : null;
      const manifest = {
        ...previous,
        [role]: {
          activeFile: `Browser confirmed: ${file.name}`,
          originalName: file.name,
          uploadedAt: asOnDate,
          backup
        },
        browserStored: true
      };
      if (role === "current") {
        manifest.activeFile = manifest.current.activeFile;
        manifest.originalName = manifest.current.originalName;
        manifest.uploadedAt = manifest.current.uploadedAt;
      }
      localStorage.setItem(FR_UPLOAD_BROWSER_MANIFEST_KEY, JSON.stringify(manifest));
      FR_UPLOAD_STATE.manifest = manifest;
      return manifest;
    }

    function formatUploadDate(value) {
      return value ? new Date(value).toLocaleString("en-IN") : "Not available";
    }

    function selectedFrAsOnDateIso(role = FR_UPLOAD_STATE.view) {
      const date = FR_UPLOAD_STATE.asOnDate[role] || TODAY_ISO;
      return new Date(`${date}T${new Date().toTimeString().slice(0, 8)}`).toISOString();
    }

    function frCopyCard(copy, index, current = false) {
      const title = current ? "Current FR Copy" : `Previous FR Copy ${index + 1}`;
      const fileName = copy?.originalName || copy?.activeFile || copy?.name || "Not available";
      const storedName = copy?.activeFile || copy?.name || "Not available";
      const uploadedAt = formatUploadDate(copy?.uploadedAt);
      return `<div class="fr-copy-card ${current ? "current" : "previous"}"><strong>${title}</strong><span><b>File:</b> ${htmlEscape(fileName)}</span><span><b>Stored as:</b> ${htmlEscape(storedName)}</span><span><b>Data as on:</b> ${htmlEscape(uploadedAt)}</span></div>`;
    }

    function frUploadToggleHtml() {
      return `<div class="copy-view-title">FR Upload Type</div><div class="upload-toggle"><button type="button" class="${FR_UPLOAD_STATE.view === "previous" ? "active" : ""}" data-fr-upload-view="previous">Previous FR - Data As On</button><button type="button" class="${FR_UPLOAD_STATE.view === "current" ? "active" : ""}" data-fr-upload-view="current">Current FR - Data As On</button></div>`;
    }

    function frUploadCopiesHtml(manifest) {
      const role = FR_UPLOAD_STATE.view;
      const roleCopy = manifest[role] || (role === "current" ? { activeFile: manifest.activeFile || "", originalName: manifest.originalName || "", uploadedAt: manifest.uploadedAt || "" } : {});
      const copyHtml = roleCopy.activeFile ? frCopyCard(roleCopy, 0, role === "current") : `<div class="fr-copy-card ${role === "current" ? "current" : "previous"}"><strong>${frRoleLabel(role)}</strong><span>No ${frRoleLabel(role).toLowerCase()} file confirmed yet.</span></div>`;
      const backupHtml = roleCopy.backup ? frCopyCard(roleCopy.backup, 0, false) : `<div class="fr-copy-card previous"><strong>${frRoleLabel(role)} Backup Copy</strong><span>No backup copy kept yet. One backup will be kept when this ${frRoleLabel(role).toLowerCase()} is replaced.</span></div>`;
      return `${copyHtml}${backupHtml}`;
    }

    function frUploadPanel() {
      queueFrManifestLoad();
      const manifest = FR_UPLOAD_STATE.manifest || {};
      const role = FR_UPLOAD_STATE.view;
      const roleCopy = manifest[role] || {};
      const activeFile = roleCopy.activeFile || (role === "current" ? manifest.activeFile : "") || `No ${frRoleLabel(role).toLowerCase()} source file confirmed yet`;
      const uploadedAt = roleCopy.uploadedAt ? formatUploadDate(roleCopy.uploadedAt) : "Not available";
      const originalName = roleCopy.originalName || "Not available";
      const backup = roleCopy.backup;
      const backups = backup
        ? `<li><strong>${htmlEscape(frRoleLabel(role))} Backup Copy</strong><br>${htmlEscape(backup.originalName || backup.activeFile || "Not available")}<br>Data as on: ${htmlEscape(formatUploadDate(backup.uploadedAt))}</li>`
        : `<li>No backup copy for ${htmlEscape(frRoleLabel(role))} yet.</li>`;
      const selected = FR_UPLOAD_STATE.files[role]
        ? `${htmlEscape(FR_UPLOAD_STATE.files[role].name)} (${formatFileSize(FR_UPLOAD_STATE.files[role].size)})`
        : "No file selected";
      return `
        <div class="upload-card">
          <p class="subtitle">Upload <strong>Previous FR</strong> and <strong>Current FR</strong> separately. Each upload has its own Data as on date and keeps one backup copy when replaced.</p>
          <div class="upload-status muted">${isLocalApiHost() ? "Local mode: Confirm & Store writes through the local upload server." : "GitHub Pages mode: password unlock, file verify, and confirmation work in browser. Repository file update is completed by committing the same file to data/fr."}</div>
          ${frUploadToggleHtml()}
          ${frUploadCopiesHtml(manifest)}
          <div class="upload-grid">
            <div class="upload-box">
              <h3>${htmlEscape(frRoleLabel(role))} Source</h3>
              <div class="upload-path"><strong>Active file:</strong> ${htmlEscape(activeFile)}</div>
              <div class="upload-path"><strong>Original upload:</strong> ${htmlEscape(originalName)}</div>
              <div class="upload-path"><strong>Data as on:</strong> ${htmlEscape(uploadedAt)}</div>
            </div>
            <div class="upload-box">
              <h3>${htmlEscape(frRoleLabel(role))} Backup Copy</h3>
              <ol class="backup-list">${backups}</ol>
              <button class="reset-btn" type="button" data-refresh-fr-manifest>Refresh Source List</button>
            </div>
          </div>
          <label class="file-picker">Upload ${htmlEscape(frRoleLabel(role))} file (.xls or .xlsx)<input type="file" accept=".xls,.xlsx,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" data-fr-upload-file="${role}"></label>
          <label class="file-picker">${htmlEscape(frRoleLabel(role))} data as on date<input type="date" value="${htmlEscape(FR_UPLOAD_STATE.asOnDate[role] || TODAY_ISO)}" data-fr-as-on-date="${role}"></label>
          <div class="upload-path"><strong>Selected file:</strong> ${selected}</div>
          <div class="upload-actions">
            <button class="reset-btn" type="button" data-fr-upload-check="${role}">Verify ${htmlEscape(frRoleLabel(role))}</button>
            <button class="export-btn upload-btn" type="button" data-fr-upload-store="${role}">Confirm & Store ${htmlEscape(frRoleLabel(role))}</button>
          </div>
          <div class="upload-status ${FR_UPLOAD_STATE.statusType}">${htmlEscape(FR_UPLOAD_STATE.status)}</div>
        </div>`;
    }

    async function storeFrUploadFile(role = FR_UPLOAD_STATE.view) {
      if (!await requestFrUploadPassword()) return;
      const file = FR_UPLOAD_STATE.files[role];
      try {
        await validateFrExcelFile(file);
      } catch (error) {
        FR_UPLOAD_STATE.status = error.message;
        FR_UPLOAD_STATE.statusType = "bad";
        renderPanels();
        return;
      }
      const confirmed = window.confirm(`${isLocalApiHost() ? "Store" : "Confirm"} ${file.name} as ${frRoleLabel(role)} with Data as on ${FR_UPLOAD_STATE.asOnDate[role] || TODAY_ISO}? One backup copy will be kept when replaced.`);
      if (!confirmed) {
        FR_UPLOAD_STATE.status = "Upload cancelled. No file was stored.";
        FR_UPLOAD_STATE.statusType = "muted";
        renderPanels();
        return;
      }
      if (!isLocalApiHost() || role === "previous") {
        const saved = saveFrUploadInBrowser(file, role);
        FR_UPLOAD_STATE.files[role] = null;
        FR_UPLOAD_STATE.view = role;
        FR_UPLOAD_STATE.status = `Confirmed ${frRoleLabel(role)} for GitHub-hosted portal: ${saved[role].originalName}. This browser now shows it with Data as on ${formatUploadDate(saved[role].uploadedAt)}.`;
        FR_UPLOAD_STATE.statusType = "good";
        renderPanels();
        return;
      }
      FR_UPLOAD_STATE.status = "Uploading and storing FR file...";
      FR_UPLOAD_STATE.statusType = "muted";
      renderPanels();
      try {
        const form = new FormData();
        form.append("frFile", file);
        form.append("password", FR_UPLOAD_STATE.password);
        const response = await fetch("../api/fr-upload", { method: "POST", body: form });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload.error) throw new Error(payload.error || "FR upload failed");
        FR_UPLOAD_STATE.files[role] = null;
        FR_UPLOAD_STATE.manifest = payload.saved;
        FR_UPLOAD_STATE.status = `Stored successfully: ${payload.saved.activeFile}`;
        FR_UPLOAD_STATE.statusType = "good";
      } catch (error) {
        const saved = saveFrUploadInBrowser(file, role);
        FR_UPLOAD_STATE.files[role] = null;
        FR_UPLOAD_STATE.view = role;
        FR_UPLOAD_STATE.status = `Local upload API not available, so browser confirmation was saved instead for ${frRoleLabel(role)}: ${saved[role].originalName}.`;
        FR_UPLOAD_STATE.statusType = "good";
      }
      renderPanels();
    }
    const tabs = [
      { id: "open-sheet", label: "OPEN LINE FR", content: () => filterBar() + summaryCards(workbookData[0]) + sheetTable(workbookData[0]) },
      { id: "gsu-sheet", label: "GSU FR", content: () => filterBar() + summaryCards(workbookData[1]) + sheetTable(workbookData[1]) },
      { id: "open-report", label: "OPEN LINE Report", content: () => filterBar() + reportTable(workbookData[0], "open-line-report-table") },
      { id: "gsu-report", label: "GSU Report", content: () => filterBar() + reportTable(workbookData[1], "gsu-report-table") },
      { id: "open-analysis", label: "OPEN LINE Analysis", content: () => filterBar() + analysisTable(workbookData[0]) },
      { id: "gsu-analysis", label: "GSU Analysis", content: () => filterBar() + analysisTable(workbookData[1]) },
    ];
    const uploadTab = { id: "fr-upload", label: "FR Upload", content: () => frUploadPanel() };
    const panelList = () => [...tabs, uploadTab];

    const tabsEl = document.getElementById("tabs");
    const appEl = document.getElementById("app");

    function renderTabs() {
      tabsEl.innerHTML = tabs.map(tab => `<button class="tab${tab.id === activeTabId ? " active" : ""}" data-tab="${tab.id}">${tab.label}</button>`).join("");
    }

    function renderPanels() {
      appEl.innerHTML = panelList().map(tab => `<section class="panel${tab.id === activeTabId ? " active" : ""}" id="${tab.id}"><h2>${tab.label}</h2>${tab.content()}</section>`).join("");
    }

    function renderAll() {
      renderTabs();
      renderPanels();
    }

    document.getElementById("open-fr-upload").addEventListener("click", async () => {
      if (!await requestFrUploadPassword()) return;
      activeTabId = "fr-upload";
      renderAll();
    });

    tabsEl.addEventListener("click", event => {
      const button = event.target.closest(".tab");
      if (!button) return;
      activeTabId = button.dataset.tab;
      renderAll();
    });

    appEl.addEventListener("change", event => {
      const asOnDateInput = event.target.closest("[data-fr-as-on-date]");
      if (asOnDateInput) {
        const role = asOnDateInput.dataset.frAsOnDate || FR_UPLOAD_STATE.view;
        FR_UPLOAD_STATE.asOnDate[role] = asOnDateInput.value || TODAY_ISO;
        FR_UPLOAD_STATE.status = `${frRoleLabel(role)} data as on date set to ${FR_UPLOAD_STATE.asOnDate[role]}.`;
        FR_UPLOAD_STATE.statusType = "muted";
        renderPanels();
        return;
      }
      const uploadInput = event.target.closest("[data-fr-upload-file]");
      if (uploadInput) {
        const role = uploadInput.dataset.frUploadFile || FR_UPLOAD_STATE.view;
        FR_UPLOAD_STATE.files[role] = uploadInput.files[0] || null;
        FR_UPLOAD_STATE.status = FR_UPLOAD_STATE.files[role] ? `Ready to verify ${frRoleLabel(role)}: ${FR_UPLOAD_STATE.files[role].name}` : `No ${frRoleLabel(role).toLowerCase()} file selected.`;
        FR_UPLOAD_STATE.statusType = FR_UPLOAD_STATE.files[role] ? "good" : "muted";
        renderPanels();
        return;
      }
      const select = event.target.closest("[data-filter]");
      if (!select) return;
      filterState[select.dataset.filter] = select.value;
      renderPanels();
    });

    appEl.addEventListener("click", event => {
      const uploadViewButton = event.target.closest("[data-fr-upload-view]");
      if (uploadViewButton) {
        FR_UPLOAD_STATE.view = uploadViewButton.dataset.frUploadView;
        renderPanels();
        return;
      }
      if (event.target.closest("[data-reset-filter]")) {
        filterState.planHead = "ALL";
        filterState.fund = "ALL";
        renderPanels();
        return;
      }
      if (event.target.closest("[data-refresh-fr-manifest]")) {
        FR_UPLOAD_STATE.manifest = null;
        FR_UPLOAD_STATE.status = "Refreshing FR source list...";
        FR_UPLOAD_STATE.statusType = "muted";
        loadFrUploadManifest().then(renderPanels);
        return;
      }
      const checkButton = event.target.closest("[data-fr-upload-check]");
      if (checkButton) {
        const role = checkButton.dataset.frUploadCheck || FR_UPLOAD_STATE.view;
        const file = FR_UPLOAD_STATE.files[role];
        if (!file) {
          FR_UPLOAD_STATE.status = `Please select the ${frRoleLabel(role)} Excel file first.`;
          FR_UPLOAD_STATE.statusType = "bad";
          renderPanels();
          return;
        }
        validateFrExcelFile(file)
          .then(() => {
            FR_UPLOAD_STATE.status = `Verified ${frRoleLabel(role)} Excel file: ${file.name} (${formatFileSize(file.size)}), Data as on ${FR_UPLOAD_STATE.asOnDate[role] || TODAY_ISO}.`;
            FR_UPLOAD_STATE.statusType = "good";
            renderPanels();
          })
          .catch(error => {
            FR_UPLOAD_STATE.status = error.message;
            FR_UPLOAD_STATE.statusType = "bad";
            renderPanels();
          });
        return;
      }
      const storeButton = event.target.closest("[data-fr-upload-store]");
      if (storeButton) {
        storeFrUploadFile(storeButton.dataset.frUploadStore || FR_UPLOAD_STATE.view);
      }
    });

    renderAll();

  </script>
</body>
</html>
