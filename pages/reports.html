<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advanced Report and Chart Analysis</title>
  <link rel="stylesheet" href="../assets/reports.css?v=20260713-formula-1">
</head>
<body>
  <main class="wrap">
    <h2 class="title">Moradabad Division Accounts</h2>
    <section class="panel">
      <div class="hero">
        <h1 id="reportTitle">Advanced Report and Chart Analysis</h1>
        <div class="actions">
          <button class="export" id="exportReportExcel" type="button">Export Excel</button>
          <button class="export" id="exportReportPdf" type="button">Generate PDF</button>
        </div>
      </div>
      <div class="report-menu" id="reportMenu"></div>
      <div class="toolbar">
        <label id="scopeWrap">Report Scope<select id="scope"></select></label>
        <label id="itemWrap">Item<select id="item"></select></label>
        <label id="metricWrap">Analysis Option<select id="metric"></select></label>
        <label id="basisWrap">Actual Basis<select id="basis"><option value="completed">Completed Month - JUN 2026 (03)</option><option value="tilldate">Till Date / Running Month - JUL 2026 (04)</option></select></label>
        <label id="monthWrap">Specific Month<select id="month"></select></label>
        <label id="chartWrap">Chart Type<select id="chart"></select></label>
        <label id="importantPuWrap" class="check-control"><input id="importantPuOnly" type="checkbox"> Show Important PU only (27, 28, 30, 32, 60)</label>
      </div>
      <div class="content" id="host"></div>
    </section>
  </main>
  <script src="../data/reports-data.js?v=20260713-formula-1"></script>
  <script src="../assets/reports.js?v=20260713-formula-1"></script>
</body>
</html>
